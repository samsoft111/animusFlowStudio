<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="AeroSpace — fundo orbital demo">
  <defs>
    <radialGradient id="sky" cx="50%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#0b1838"/>
      <stop offset="55%" stop-color="#050b1f"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0b2a55"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="92%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- estrelas -->
  <g fill="#ffffff">
    <circle cx="120" cy="90" r="1.6" opacity="0.8"/><circle cx="300" cy="160" r="1" opacity="0.5"/>
    <circle cx="520" cy="70" r="1.3" opacity="0.7"/><circle cx="760" cy="130" r="0.9" opacity="0.5"/>
    <circle cx="980" cy="60" r="1.7" opacity="0.9"/><circle cx="1180" cy="150" r="1.1" opacity="0.6"/>
    <circle cx="1380" cy="80" r="1.4" opacity="0.7"/><circle cx="1500" cy="200" r="1" opacity="0.5"/>
    <circle cx="200" cy="320" r="1.2" opacity="0.6"/><circle cx="640" cy="300" r="1" opacity="0.5"/>
    <circle cx="1060" cy="280" r="1.5" opacity="0.8"/><circle cx="1450" cy="340" r="1" opacity="0.5"/>
    <circle cx="80" cy="500" r="1.1" opacity="0.5"/><circle cx="420" cy="540" r="1.3" opacity="0.6"/>
    <circle cx="1520" cy="520" r="1.2" opacity="0.6"/><circle cx="1320" cy="470" r="0.9" opacity="0.4"/>
  </g>
  <!-- planeta -->
  <circle cx="1230" cy="720" r="430" fill="url(#atmo)"/>
  <circle cx="1230" cy="760" r="360" fill="url(#planet)"/>
  <ellipse cx="1230" cy="640" rx="540" ry="120" fill="none" stroke="#22D3EE" stroke-opacity="0.35" stroke-width="2" transform="rotate(-18 1230 760)"/>
  <ellipse cx="1230" cy="640" rx="600" ry="140" fill="none" stroke="#3B82F6" stroke-opacity="0.25" stroke-width="2" transform="rotate(-18 1230 760)"/>
  <!-- grelha de horizonte -->
  <g stroke="#3B82F6" stroke-opacity="0.18" stroke-width="1">
    <path d="M0 760 H1600"/><path d="M0 800 H1600"/><path d="M0 850 H1600"/>
    <path d="M200 740 L-100 900"/><path d="M500 740 L350 900"/><path d="M800 740 L800 900"/>
    <path d="M1100 740 L1250 900"/><path d="M1400 740 L1700 900"/>
  </g>
  <!-- drone de carga -->
  <g transform="translate(360 360)" fill="none" stroke="#22D3EE" stroke-width="3">
    <rect x="-60" y="-22" width="120" height="44" rx="10" fill="#0b1838"/>
    <line x1="-60" y1="0" x2="-150" y2="-40"/><line x1="60" y1="0" x2="150" y2="-40"/>
    <circle cx="-150" cy="-40" r="16" fill="#030712"/><circle cx="150" cy="-40" r="16" fill="#030712"/>
    <line x1="-30" y1="22" x2="-30" y2="60"/><line x1="30" y1="22" x2="30" y2="60"/>
    <rect x="-44" y="60" width="88" height="34" rx="6" fill="#0b2a55"/>
    <circle cx="0" cy="0" r="6" fill="#22D3EE" stroke="none"/>
  </g>
  <rect width="1600" height="900" fill="url(#glow)" opacity="0.08"/>
  <text x="80" y="180" font-family="Outfit, Inter, sans-serif" font-size="64" font-weight="800" fill="#F9FAFB" letter-spacing="6">AERO<tspan fill="#22D3EE">SPACE</tspan></text>
  <text x="82" y="225" font-family="Inter, sans-serif" font-size="22" fill="#94A3B8" letter-spacing="3">LOGÍSTICA AUTÓNOMA · MONITORIZAÇÃO ORBITAL</text>
</svg>
