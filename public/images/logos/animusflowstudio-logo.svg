<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 80">
  <defs>
    <linearGradient id="afsl-l1" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93A4F8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="afsl-l2" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="afsl-l3" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="afsl-spark" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Icon (scaled 0.75×, shifted right 5px) -->
  <g transform="translate(5,4) scale(0.75)">
    <!-- Bottom card -->
    <rect x="18" y="70" width="64" height="19" rx="7" fill="url(#afsl-l3)"/>
    <!-- Middle card -->
    <rect x="18" y="51" width="64" height="19" rx="7" fill="url(#afsl-l2)"/>
    <!-- Top card -->
    <rect x="18" y="32" width="64" height="19" rx="7" fill="url(#afsl-l1)"/>
    <!-- Sparkle -->
    <path d="M75.5,14 L78,22 L86,24.5 L78,27 L75.5,35 L73,27 L65,24.5 L73,22 Z"
          fill="url(#afsl-spark)"/>
  </g>

  <!-- Wordmark: "AnimusFlow" bold + "Studio" light italic -->
  <text x="90" y="44"
        font-family="'Inter', system-ui, -apple-system, Arial, sans-serif"
        font-size="32" font-weight="700" fill="white" letter-spacing="-0.5">
    AnimusFlow
  </text>
  <text x="92" y="66"
        font-family="'Inter', system-ui, -apple-system, Arial, sans-serif"
        font-size="22" font-weight="300" font-style="italic"
        fill="rgba(255,255,255,0.65)" letter-spacing="2">
    Studio
  </text>
</svg>
